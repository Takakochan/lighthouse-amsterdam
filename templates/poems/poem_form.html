{% extends 'base.html' %}

{% block title %}{{ action }} a Poem - Lighthouse Amsterdam{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 680px;">
    <h1 class="mb-4">{{ action }} a Poem</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">{{ action }}</button>
        <a href="{% url 'poem_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
