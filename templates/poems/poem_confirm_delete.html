{% extends 'base.html' %}

{% block title %}Delete Poem - Lighthouse Amsterdam{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 480px;">
    <h1>Delete this poem?</h1>
    <p>You are about to delete <strong>"{{ poem.title }}"</strong>. This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'poem_detail' poem.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
